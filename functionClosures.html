<body>
    <h1>Closures in JS</h1>
    <button onclick="counter.increment()">Increment</button>
    <button onclick="counter.decrement()">Decrement</button>


    <script>

        function counterApp(){
            let data = 0;
            return {
                increment:function(){
                    console.log(++data);
                    
                },
                decrement:function(){
                    console.log(--data);
                    
                }
            }
        }
        let counter = counterApp();
