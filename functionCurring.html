    <title>function Currying</title>
</head>
<body>
    <h1>function Currying in JS</h1>
    <button onclick="watchOutput(50)">Click</button>
    <script>
        // function add (a,b){
        //     return a+b
        // }
        // console.log(add(10,20));

        function add(a){
            return function(b){
                return a+b
            }
        }
        let out = add(100)

        function watchOutput(b){
            console.log(out(50));
            
        }
        
        
    </script>
</body>
