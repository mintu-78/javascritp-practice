<head>

    <title>Document</title>
    <script>
        
function showMessage(message){
    alert(message);
}

function showUser(){
    showMessage("Name: Mintu Kumar");
}

function showAge(){
    showMessage("Age: 20 Years");
}

function showCity(){
    showMessage("City: Ranchi");
}

    </script>
 </head>
 <bodya>
