<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List of Array Item</title>
</head>

<body>
    <h1>List of Array Item</h1>
    <span>Element Position</span>
    <input type="text" id="position" placeholder="enter position">
    <br>
    <br>
    <span>Element Value</span>
    <input type="text" id="value" placeholder="enter Value">
    <br>
    <br>
    <button onclick="displayElement()">Display Items</button>

   
</body>
 <ul id="list">

    </ul>
<script>
    let fruits = ["Apple", "Banana", "Orange", "Mango",];
    console.log(fruits);

    function displayElement() {
        let val = document.getElementById('value').value;
        let pos = document.getElementById('position').value;
        if(pos && val){
            fruits.splice(pos,0,val)
        }
        
        let list = document.getElementById('list');
        list.innerHTML= "";
        for(let fruit of fruits ){
            // console.log(fruits);
            list.innerHTML+="<li>"+fruit+"</li>"
            
        }
       


    }


</script>

</html>
